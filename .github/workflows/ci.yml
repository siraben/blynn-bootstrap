name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fast-native:
    name: fast native
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        attr:
          - tests.precisely.dialect
          - tests.host.ghc.native.smoke.m1
          - tests.host.ghc.native.mescc
          - proof.mutableIO
          - tinycc.host.ghc.native
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: nix build --print-build-logs ".#${{ matrix.attr }}"

  faithful:
    name: faithful debug path
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        attr:
          - tests.tinyccM1.native-vs-faithful
          - tinycc.m2.precisely.gcc
          - tinycc.m2.precisely.gccm2
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: nix build --print-build-logs ".#${{ matrix.attr }}"

  tcc-precisely-backend:
    name: tcc backend
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        attr:
          - hcc.gcc.precisely.tcc
          - tinycc.gcc.precisely.tcc
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: nix build --print-build-logs ".#${{ matrix.attr }}"

  boss:
    name: boss stage0 path
    runs-on: ubuntu-latest
    timeout-minutes: 720
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        attr:
          - tinycc.m2.precisely.m2
          - gnuHello.m2.precisely.m2
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: nix build --print-build-logs ".#${{ matrix.attr }}"
