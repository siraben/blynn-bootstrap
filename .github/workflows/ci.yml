name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.suite }} (${{ matrix.arch }}, ${{ matrix.attr }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: fast native
            arch: amd64
            runner: ubuntu-latest
            timeout: 120
            attr: tests.precisely.dialect
          - suite: fast native
            arch: amd64
            runner: ubuntu-latest
            timeout: 120
            attr: tests.host.ghc.native.smoke.m1
          - suite: fast native
            arch: amd64
            runner: ubuntu-latest
            timeout: 120
            attr: tests.host.ghc.native.mescc
          - suite: fast native
            arch: amd64
            runner: ubuntu-latest
            timeout: 120
            attr: tinycc.host.ghc.native
          - suite: fast native
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 120
            attr: tests.precisely.dialect
          - suite: fast native
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 120
            attr: tests.host.ghc.native.smoke.m1
          - suite: fast native
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 120
            attr: tests.host.ghc.native.mescc
          - suite: fast native
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 120
            attr: tinycc.host.ghc.native
          - suite: faithful debug path
            arch: amd64
            runner: ubuntu-latest
            timeout: 360
            attr: tests.tinyccM1.native-vs-faithful
          - suite: faithful debug path
            arch: amd64
            runner: ubuntu-latest
            timeout: 360
            attr: tinycc.m2.precisely.gcc
          - suite: faithful debug path
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 360
            attr: tests.tinyccM1.native-vs-faithful
          - suite: faithful debug path
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 360
            attr: tinycc.m2.precisely.gcc
          - suite: tcc backend
            arch: amd64
            runner: ubuntu-latest
            timeout: 360
            attr: hcc.gcc.precisely.tcc
          - suite: tcc backend
            arch: amd64
            runner: ubuntu-latest
            timeout: 360
            attr: tinycc.gcc.precisely.tcc
          - suite: tcc backend
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 360
            attr: hcc.gcc.precisely.tcc
          - suite: tcc backend
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 360
            attr: tinycc.gcc.precisely.tcc
          - suite: boss stage0 path
            arch: amd64
            runner: ubuntu-latest
            timeout: 720
            attr: tinycc.m2.precisely.m2
          - suite: boss stage0 path
            arch: aarch64
            runner: ubuntu-24.04-arm
            timeout: 720
            attr: tinycc.m2.precisely.m2
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: nix build --print-build-logs ".#${{ matrix.attr }}"
