name: Pages

on:
  push:
    branches:
      - master
      - siraben/portable-opt
      - siraben/portable-alpine-jslinux
    paths:
      - flake.lock
      - flake.nix
      - nix/**
      - scripts/**
      - hcc/**
      - patches/**
      - data/**
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Pages artifact
        run: nix build --print-build-logs .#jslinux-blynn-demo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: result
      - id: deployment
        uses: actions/deploy-pages@v4
