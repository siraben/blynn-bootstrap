# HCC sources are also consumed by Blynn's restricted Haskell dialect.
# Keep HLint from suggesting syntax or library idioms outside that subset.
- ignore: {name: "Use newtype instead of data"}
- ignore: {name: "Use record patterns"}
- ignore: {name: "Use fromMaybe"}
- ignore: {name: "Replace case with fromMaybe"}
- ignore: {name: "Use isJust"}
- ignore: {name: "Use isNothing"}
- ignore: {name: "Use foldM_"}
- ignore: {name: "Use void"}
- ignore: {name: "Use for_"}
- ignore: {name: "Use >=>"}

# Dialect fixtures intentionally exercise local lambda syntax.
- ignore: {name: "Redundant lambda"}
- ignore: {name: "Avoid lambda using `infix`"}
